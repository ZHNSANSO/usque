project_name: usque
version: 2

builds:
  - id: android
    goos: [android]
    goarch: [arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/Diniboy1123/usque/cmd.version={{.Tag}}
      - -X github.com/Diniboy1123/usque/cmd.commit={{.Commit}}
      - -X github.com/Diniboy1123/usque/cmd.date={{.Date}}
    flags: [-trimpath]

  - id: linux
    goos: [linux]
    goarch: [amd64, arm, arm64, mips, mipsle, mips64, mips64le]
    goarm: [5, 6, 7]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/Diniboy1123/usque/cmd.version={{.Tag}}
      - -X github.com/Diniboy1123/usque/cmd.commit={{.Commit}}
      - -X github.com/Diniboy1123/usque/cmd.date={{.Date}}
    flags: [-trimpath]

  - id: windows
    goos: [windows]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/Diniboy1123/usque/cmd.version={{.Tag}}
      - -X github.com/Diniboy1123/usque/cmd.commit={{.Commit}}
      - -X github.com/Diniboy1123/usque/cmd.date={{.Date}}
    flags: [-trimpath]

  - id: darwin
    goos: [darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X github.com/Diniboy1123/usque/cmd.version={{.Tag}}
      - -X github.com/Diniboy1123/usque/cmd.commit={{.Commit}}
      - -X github.com/Diniboy1123/usque/cmd.date={{.Date}}
    flags: [-trimpath]

archives:
  - formats: [zip]
    name_template: "usque_{{.Version}}_{{.Os}}_{{.Arch}}{{if .Arm}}v{{.Arm}}{{end}}"
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .ProjectName }}"
